name: Bug Report
description: Report a problem with the GridNews API
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: Request Details
      description: The endpoint, HTTP method, and request you made (omit any API keys, tokens, or credentials).
      placeholder: |
        GET /v1/articles?limit=10
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Send a request to '...'
        2. With parameters/body '...'
        3. Observe response '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should the API have returned?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What did the API actually return? Include the HTTP status code and response body (with any sensitive data redacted).
    validations:
      required: true

  - type: input
    id: frequency
    attributes:
      label: Frequency
      description: One-off, intermittent, or consistently reproducible?
      placeholder: e.g. Consistently reproducible
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else relevant — client/language used to call the API, timestamps, screenshots, etc. Please do not include API keys, tokens, or other credentials.
    validations:
      required: false
